server.port=8080

# H2 file-mode database — survives restarts; data lives under ./data/efmsdb.mv.db
# AUTO_SERVER lets the H2 console open the same file while the app is running.
spring.datasource.url=jdbc:h2:file:./data/efmsdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# update = preserve existing data, evolve schema as entities change.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Web console for inspecting tables during the demo: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
